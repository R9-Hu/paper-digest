# Paper Digest Meta-Harness — control surface.
# Edit this file to track different topics / change how far back the search reaches.
# Add a topic = append a block under `topics`. Change reach = edit `earliest_date`.

global:
  obsidian_vault: /home/renjiu/Obsidian/PaperDigest
  github_repo: R9-Hu/paper-digest
  digest_model: claude-sonnet-4-6      # cheap & good for per-paper summarization
  trend_model: claude-sonnet-4-6       # trend synthesis (Sonnet for lower cost; was Opus)
  max_papers_per_topic_per_run: 30     # safety cap (especially the first backfill)
  claude_bin: claude                   # path to the Claude Code CLI
  claude_timeout_sec: 600              # per-call timeout for headless claude -p
  digest_concurrency: 3                # parallel claude -p digests (lower = gentler on rate limits)
  digest_max_chars: 30000              # paper text sent per digest (lower = fewer input tokens)
  digest_window_start: 21              # only DIGEST between these hours (24h), to avoid
  digest_window_end: 6                 # exhausting the rate limit during work time
  monthly_keep: 100                    # 1st of month: keep top N/topic for the previous month
  yearly_keep: 400                     # 1st of year: keep top N/topic for the previous year

topics:
  - name: "Vision-Language Models"
    slug: vlm
    earliest_date: 2025-01-01
    arxiv_categories: [cs.CV, cs.CL, cs.LG]
    keywords: ["vision-language", "VLM", "multimodal LLM", "vision language model"]
    huggingface: true
    conferences: [CVPR, ICCV, NeurIPS, ICLR]
    intro: >
      Vision-Language Models couple a visual encoder with a language model so a
      single system can perceive images (and video) and reason or converse about
      them. This topic tracks architectures, training recipes, benchmarks,
      grounding/interpretability, and the move toward unified multimodal
      foundation models.

  - name: "Foundation Models in Medicine"
    slug: med-foundation
    earliest_date: 2025-01-01
    arxiv_categories: [eess.IV, cs.CV, cs.LG]
    keywords: ["medical foundation model", "clinical LLM", "generalist medical AI", "medical image foundation"]
    huggingface: true
    conferences: [MICCAI, CVPR, NeurIPS]
    intro: >
      Foundation models for medicine are large pretrained models adapted to
      clinical and biomedical data — medical imaging (radiology, pathology,
      ophthalmology), clinical text, and multimodal records. This topic tracks
      generalist medical models, self-supervised pretraining, clinical LLMs and
      agents, evaluation, and safety/robustness for deployment.

  - name: "Agentic AI / LLM Agents"
    slug: agentic-ai
    earliest_date: 2025-01-01
    arxiv_categories: [cs.AI, cs.CL, cs.LG]
    keywords: ["LLM agent", "multi-agent", "tool use", "agentic", "autonomous agent"]
    huggingface: true
    conferences: [NeurIPS, ICLR, ICML]
    intro: >
      Agentic AI studies LLMs that plan, use tools, and act over multiple steps to
      accomplish goals — single agents and multi-agent systems. This topic tracks
      reasoning and planning, tool use and function calling, memory, multi-agent
      orchestration and communication, training (RL for agents), and benchmarks.

  - name: "Harnesses / Meta-Harnesses"
    slug: harness
    earliest_date: 2025-01-01
    arxiv_categories: [cs.AI, cs.CL, cs.SE]
    keywords: ["agent harness", "agent scaffolding", "agent orchestration", "agent framework", "agentic workflow"]
    huggingface: true
    conferences: [NeurIPS, ICLR]
    intro: >
      The harness is the scaffold around a model — prompts, tools, memory, control
      flow, and environment. This topic tracks the harness as a first-class
      research object: composable/evolvable harness frameworks, learned
      controllers and orchestration policies, workflow optimization, environment
      engineering, and benchmarks that hold the model fixed to measure scaffolding.
