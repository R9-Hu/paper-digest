site_name: Paper Digest
site_description: Daily auto-generated research paper digests and trend analysis
theme:
  name: material
  features:
  - navigation.sections
  - navigation.top
  - content.code.copy
  - search.suggest
  palette:
  - scheme: default
    primary: indigo
    accent: indigo
    toggle:
      icon: material/weather-night
      name: Dark mode
  - scheme: slate
    primary: indigo
    accent: indigo
    toggle:
      icon: material/weather-sunny
      name: Light mode
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- toc
- tables
plugins:
- search
nav:
- Home: index.md
- Vision-Language Models:
  - Overview: vlm/index.md
  - Trend analysis: vlm/trend.md
  - Papers:
    - 'Gaze Heads: How VLMs Look at What They Describe': vlm/papers/gaze-heads-how-vlms-look-at-what-they-describe.md
- Foundation Models in Medicine:
  - Overview: med-foundation/index.md
- Agentic AI / LLM Agents:
  - Overview: agentic-ai/index.md
- Harnesses / Meta-Harnesses:
  - Overview: harness/index.md
